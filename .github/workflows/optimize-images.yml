name: Optimize static images

on:
  workflow_dispatch:
    inputs:
      quality:
        description: WebP quality (1-100)
        required: true
        default: "82"
      delete_originals:
        description: Delete the original images after conversion
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Optimize images
        env:
          WEBP_QUALITY: ${{ inputs.quality }}
          DELETE_ORIGINALS: ${{ inputs.delete_originals }}
        run: |
          args=(--apply --quality "$WEBP_QUALITY")
          if [[ "$DELETE_ORIGINALS" == "true" ]]; then
            args+=(--delete-originals)
          fi
          uv run site-image-optimize "${args[@]}"

      - name: Run tests
        run: uv run pytest

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Open optimization pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/optimize-images
          delete-branch: true
          commit-message: "Optimize static images as WebP"
          title: "Optimize static images as WebP"
          body: |
            Converts eligible images under `static/` to WebP and updates local
            references. Generated by the **Optimize static images** workflow.
